<style>
@import url('https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800&display=swap');

:root {
  --bg: #0B0B10;
  --bg2: #111118;
  --card: #1A1A24;
  --card-hover: #22222E;
  --border: #2A2A38;
  --accent: #6C63FF;
  --accent-light: #8B84FF;
  --accent-dim: rgba(108,99,255,0.12);
  --green: #2DD4A8;
  --green-dim: rgba(45,212,168,0.12);
  --red: #FF6B6B;
  --red-dim: rgba(255,107,107,0.12);
  --yellow: #FFD93D;
  --orange: #FF8C42;
  --orange-dim: rgba(255,140,66,0.12);
  --pink: #FF6B9D;
  --pink-dim: rgba(255,107,157,0.12);
  --text: #E8E8F0;
  --text2: #8888A0;
  --text3: #55556A;
  --radius: 14px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  font-family: 'Rubik', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  direction: rtl;
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

@keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
@keyframes scaleIn { from { opacity:0; transform:scale(0.92); } to { opacity:1; transform:scale(1); } }
@keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
@keyframes glow { 0%,100%{ box-shadow:0 0 20px rgba(108,99,255,0.15); } 50%{ box-shadow:0 0 35px rgba(108,99,255,0.3); } }

.fade-up { animation: fadeUp 0.5s ease forwards; opacity:0; }
.d1 { animation-delay: 80ms; }
.d2 { animation-delay: 160ms; }
.d3 { animation-delay: 240ms; }
.d4 { animation-delay: 320ms; }

.app {
  max-width: 520px;
  margin: 0 auto;
  padding: calc(var(--safe-top) + 12px) 16px calc(var(--safe-bottom) + 90px);
  min-height: 100vh;
  min-height: 100dvh;
}

.welcome-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; min-height: 100dvh; padding: 40px 24px; text-align: center;
}
.welcome-logo { font-size: 48px; margin-bottom: 8px; }
.welcome-title {
  font-size: 36px; font-weight: 800; letter-spacing: 2px;
  background: linear-gradient(135deg, var(--accent), var(--green));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px;
}
.welcome-sub { color: var(--text3); font-size: 14px; margin-bottom: 40px; }

.profile-card-select { width: 100%; max-width: 360px; }
.profile-option {
  display: flex; align-items: center; gap: 14px;
  background: var(--card); border: 1.5px solid var(--border); border-radius: 16px;
  padding: 18px 20px; margin-bottom: 12px; cursor: pointer; transition: all 0.2s; text-align: right;
}
.profile-option:active { transform: scale(0.97); border-color: var(--accent); }
.profile-avatar {
  width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.profile-name { font-size: 16px; font-weight: 600; }
.profile-meta { font-size: 12px; color: var(--text3); margin-top: 2px; }

.new-profile-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 16px;
  background: var(--accent-dim); border: 1.5px dashed var(--accent); border-radius: 16px;
  color: var(--accent); font-family: inherit; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 4px; transition: all 0.2s;
}
.new-profile-btn:active { transform: scale(0.97); }

.create-profile { width: 100%; max-width: 400px; margin: 0 auto; padding: 40px 24px; }
.create-title { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 8px; }
.create-sub { font-size: 13px; color: var(--text3); text-align: center; margin-bottom: 32px; }

.avatar-picker { display: flex; justify-content: center; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; }
.avatar-choice {
  width: 52px; height: 52px; border-radius: 50%; border: 3px solid transparent;
  display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; transition: all 0.2s;
}
.avatar-choice.active { border-color: #fff; transform: scale(1.12); box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
.avatar-choice:active { transform: scale(0.95); }

.form-group { margin-bottom: 18px; }
.form-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; display: block; }
.form-input {
  width: 100%; background: var(--bg); border: 1.5px solid var(--border); color: var(--text);
  padding: 13px 16px; border-radius: 12px; font-family: inherit; font-size: 15px; direction: rtl; transition: border-color 0.2s;
}
.form-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
.form-input::placeholder { color: var(--text3); }

.mode-toggle { display: flex; gap: 10px; margin-bottom: 24px; }
.mode-card {
  flex: 1; background: var(--card); border: 1.5px solid var(--border); border-radius: 14px;
  padding: 18px 14px; text-align: center; cursor: pointer; transition: all 0.2s;
}
.mode-card.active { border-color: var(--accent); background: var(--accent-dim); }
.mode-card:active { transform: scale(0.96); }
.mode-icon { font-size: 28px; margin-bottom: 6px; }
.mode-label { font-size: 13px; font-weight: 600; }
.mode-desc { font-size: 10px; color: var(--text3); margin-top: 4px; line-height: 1.4; }

.primary-btn {
  width: 100%; padding: 15px; border: none; border-radius: 14px;
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  color: #fff; font-family: inherit; font-weight: 700; font-size: 16px; cursor: pointer; margin-top: 8px; transition: all 0.2s;
}
.primary-btn:active { transform: scale(0.97); }
.primary-btn:disabled { opacity: 0.4; pointer-events: none; }
.secondary-btn {
  width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 12px;
  background: transparent; color: var(--text2); font-family: inherit; font-weight: 500; font-size: 14px; cursor: pointer; margin-top: 10px;
}

.header { display: flex; align-items: center; justify-content: space-between; padding: 14px 0 18px; }
.header-right { display: flex; align-items: center; gap: 10px; }
.header-avatar {
  width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700; color: #fff; cursor: pointer; transition: transform 0.2s;
}
.header-avatar:active { transform: scale(0.9); }
.logo {
  font-size: 22px; font-weight: 800; letter-spacing: 1px;
  background: linear-gradient(135deg, var(--accent), var(--green));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.logo-sub { font-size: 10px; color: var(--text3); }
.couple-badge {
  display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 20px;
  background: var(--pink-dim); color: var(--pink); font-size: 11px; font-weight: 600;
}

.partner-banner {
  background: linear-gradient(135deg, var(--pink-dim), var(--accent-dim));
  border: 1px solid rgba(255,107,157,0.25); border-radius: var(--radius);
  padding: 14px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px;
}
.partner-avatars { display: flex; }
.partner-av {
  width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: #fff; border: 2px solid var(--bg);
}
.partner-av:nth-child(2) { margin-right: -10px; }
.partner-text { flex:1; }
.partner-title { font-size: 13px; font-weight: 600; }
.partner-sub { font-size: 11px; color: var(--text3); }

.stats { display: flex; gap: 10px; margin-bottom: 18px; }
.stat-card {
  flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px 12px; position: relative; overflow: hidden; transition: transform 0.2s;
}
.stat-card:active { transform: scale(0.97); }
.stat-bar { position:absolute; top:0; left:0; right:0; height:3px; border-radius: var(--radius) var(--radius) 0 0; }
.stat-icon { font-size: 18px; margin-bottom: 6px; }
.stat-label { font-size: 10px; color: var(--text2); margin-bottom: 3px; }
.stat-value { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }

.chart-card {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 16px; margin-bottom: 12px;
}
.chart-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
canvas { width: 100% !important; height: auto !important; }

.legend { display: flex; flex-direction: column; gap: 6px; margin-top: 12px; }
.legend-item { display: flex; align-items: center; justify-content: space-between; font-size: 12px; padding: 5px 8px; border-radius: 8px; }
.legend-dot { width: 9px; height: 9px; border-radius: 3px; margin-left: 8px; flex-shrink:0; }
.legend-name { flex: 1; }
.legend-val { font-weight: 600; color: var(--text2); font-size: 11px; }

.search-bar {
  background: var(--card); border: 1.5px solid var(--border); color: var(--text); width: 100%;
  padding: 11px 14px; border-radius: 12px; font-family: inherit; font-size: 14px; margin-bottom: 10px; direction: rtl; transition: border-color 0.2s;
}
.search-bar:focus { outline:none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
.search-bar::placeholder { color: var(--text3); }

.filter-bar { display: flex; gap: 4px; margin-bottom: 12px; }
.filter-btn {
  flex: 1; padding: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text3);
  border-radius: 8px; font-family: inherit; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s;
}
.filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.tx-list { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.tx-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 14px; border-bottom: 1px solid var(--border); transition: background 0.15s;
}
.tx-row:last-child { border-bottom: none; }
.tx-row:active { background: var(--card-hover); }
.tx-icon {
  width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center;
  font-size: 16px; margin-left: 10px; flex-shrink: 0;
}
.tx-info { flex: 1; min-width: 0; }
.tx-desc { font-size: 13px; font-weight: 500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tx-meta { font-size: 10px; color: var(--text3); margin-top: 2px; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
.tx-amount { font-size: 15px; font-weight: 700; flex-shrink:0; margin-right: 6px; }
.tx-owner-dot {
  width: 14px; height: 14px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;
  font-size: 7px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.tx-delete {
  background: none; border:none; color: var(--text3); font-size: 13px; cursor:pointer;
  padding: 5px; border-radius: 6px; margin-right: 2px; transition: all 0.2s; flex-shrink:0;
}
.tx-delete:active { background: var(--red-dim); color: var(--red); }
.badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 9px; font-weight: 600; }
.empty-state { text-align: center; padding: 36px 20px; color: var(--text3); }
.empty-icon { font-size: 32px; margin-bottom: 6px; }
.tx-count { text-align:center; margin-top:10px; font-size:11px; color: var(--text3); }

.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2);
  border-top: 1px solid var(--border); display: flex; justify-content: center;
  padding: 0 0 var(--safe-bottom); z-index: 50; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}
.nav-btn {
  flex: 1; max-width: 100px; padding: 9px 0 7px; border: none; background: transparent;
  color: var(--text3); font-family: inherit; font-size: 10px; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 2px; transition: color 0.2s;
}
.nav-btn.active { color: var(--accent); }
.nav-btn .nav-icon { font-size: 20px; }

.fab {
  position: fixed; bottom: calc(66px + var(--safe-bottom)); left: 50%; transform: translateX(-50%);
  width: 54px; height: 54px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  border: none; color: #fff; font-size: 28px; cursor: pointer; z-index: 60;
  box-shadow: 0 6px 24px rgba(108,99,255,0.4); display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; animation: glow 3s ease infinite;
}
.fab:active { transform: translateX(-50%) scale(0.9); }

.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.65); backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px); z-index: 100; display: flex; align-items: flex-end; justify-content: center;
}
.modal-sheet {
  background: var(--card); border: 1px solid var(--border); border-radius: 24px 24px 0 0;
  width: 100%; max-width: 520px; padding: 18px 20px calc(18px + var(--safe-bottom));
  animation: slideUp 0.35s cubic-bezier(0.16,1,0.3,1); max-height: 92vh; max-height: 92dvh; overflow-y: auto;
}
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 14px; }
.modal-title { font-size: 17px; font-weight: 700; margin-bottom: 18px; text-align: center; }

.type-toggle { display: flex; gap: 6px; background: var(--bg); border-radius: 12px; padding: 4px; margin-bottom: 16px; }
.type-btn {
  flex: 1; padding: 10px; border: none; border-radius: 10px; font-family: inherit; font-weight: 600;
  font-size: 13px; cursor: pointer; transition: all 0.2s; background: transparent; color: var(--text3);
}
.type-btn.active-income { background: var(--green); color: #fff; }
.type-btn.active-expense { background: var(--red); color: #fff; }

.cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; }
.cat-btn {
  padding: 9px 4px; border: 1.5px solid var(--border); border-radius: 10px; background: var(--bg);
  color: var(--text2); font-family: inherit; font-size: 10px; cursor: pointer; text-align: center;
  transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 3px;
}
.cat-btn .cat-emoji { font-size: 18px; }
.cat-btn.active { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }

.submit-btn {
  width: 100%; padding: 14px; border: none; border-radius: 12px;
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  color: #fff; font-family: inherit; font-weight: 700; font-size: 15px; cursor: pointer; margin-top: 8px; transition: all 0.2s;
}
.submit-btn:active { transform: scale(0.97); }

.settings-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 12px; }
.settings-item {
  display: flex; align-items: center; justify-content: space-between; padding: 15px 16px;
  border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s;
}
.settings-item:last-child { border-bottom: none; }
.settings-item:active { background: var(--card-hover); }
.settings-icon { font-size: 18px; margin-left: 12px; }
.settings-label { flex:1; font-size: 13px; }
.settings-arrow { color: var(--text3); font-size: 14px; }

.share-code-box { background: var(--bg); border: 2px dashed var(--accent); border-radius: 14px; padding: 20px; text-align: center; margin: 16px 0; }
.share-code { font-size: 32px; font-weight: 800; letter-spacing: 6px; color: var(--accent); font-family: monospace; margin: 8px 0; }
.share-code-label { font-size: 12px; color: var(--text3); }
.copy-btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; background: var(--accent);
  color: #fff; border: none; border-radius: 10px; font-family: inherit; font-weight: 600; font-size: 13px; cursor: pointer; margin-top: 10px;
}
.copy-btn:active { transform: scale(0.95); }

.install-banner {
  background: linear-gradient(135deg, var(--accent-dim), rgba(45,212,168,0.08));
  border: 1px solid var(--accent); border-radius: var(--radius); padding: 14px 16px;
  margin-bottom: 16px; display: flex; align-items: center; gap: 10px; animation: fadeUp 0.5s ease forwards;
}
.install-btn {
  padding: 7px 14px; background: var(--accent); color: #fff; border: none; border-radius: 8px;
  font-family: inherit; font-weight: 600; font-size: 12px; cursor: pointer; flex-shrink: 0;
}
</style>
</head>

const MONTHS=['ינו','פבר','מרץ','אפר','מאי','יונ','יול','אוג','ספט','אוק','נוב','דצמ'];

function ci(catId){const a=[...CATS.expense,...CATS.income];return a.find(c=>c.id===catId)||{id:catId,name:catId,icon:'📌'};}
function fm(n){return '₪'+Math.abs(n).toLocaleString('he-IL');}
function fd(d){const dt=new Date(d);return dt.getDate()+' '+MONTHS[dt.getMonth()];}
function gid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5);}
function gc(){return Math.random().toString(36).substr(2,6).toUpperCase();}

function lp(){try{const d=JSON.parse(localStorage.getItem(PROFILES_KEY));if(d&&typeof d==='object')return d;}catch(e){}return{};}
function sp(p){localStorage.setItem(PROFILES_KEY,JSON.stringify(p));}
function gai(){return localStorage.getItem(ACTIVE_KEY);}
function sai(id){localStorage.setItem(ACTIVE_KEY,id);}
function gp(id){return lp()[id]||null;}

function createProfile(name,color,mode,partnerCode){
  const ps=lp(),id=gid(),code=gc();
  let coupleId=null;
  if(mode==='couple'&&partnerCode){
    const pid=Object.keys(ps).find(k=>ps[k].code===partnerCode);
    if(pid){coupleId=ps[pid].coupleId||gid();ps[pid].coupleId=coupleId;ps[pid].mode='couple';}
    else coupleId=gid();
  }else if(mode==='couple')coupleId=gid();
  ps[id]={name,color,mode,code,coupleId,transactions:sampleData(id),created:Date.now()};
  sp(ps);sai(id);return id;
}

function getPartner(pid){
  const ps=lp(),me=ps[pid];
  if(!me||!me.coupleId)return null;
  const pk=Object.keys(ps).find(k=>k!==pid&&ps[k].coupleId===me.coupleId);
  return pk?{id:pk,...ps[pk]}:null;
}

function allTx(pid){
  const ps=lp(),me=ps[pid];if(!me)return[];
  let txs=[...(me.transactions||[])];
  if(me.mode==='couple'&&me.coupleId){
    const pk=Object.keys(ps).find(k=>k!==pid&&ps[k].coupleId===me.coupleId);
    if(pk&&ps[pk].transactions)txs=[...txs,...ps[pk].transactions];
  }
  return txs;
}

function addTx(pid,tx){const ps=lp();if(!ps[pid])return;tx.owner=pid;ps[pid].transactions.unshift(tx);sp(ps);}

function delTx(pid,txId){
  const ps=lp();
  if(ps[pid])ps[pid].transactions=ps[pid].transactions.filter(t=>t.id!==txId);
  const me=ps[pid];
  if(me&&me.coupleId)Object.keys(ps).forEach(k=>{if(k!==pid&&ps[k].coupleId===me.coupleId)ps[k].transactions=ps[k].transactions.filter(t=>t.id!==txId);});
  sp(ps);
}

function delProfile(id){const ps=lp();delete ps[id];sp(ps);if(gai()===id)localStorage.removeItem(ACTIVE_KEY);}

function sampleData(oid){return[];}

}

function exportCSV(){
  const pid=gai(),txs=allTx(pid),ps=lp(),BOM='\uFEFF';

  const blob=new Blob([BOM+header+rows],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='smartflow_export.csv';a.click();

// Canvas
function drawPie(id,data){
  const c=document.getElementById(id);if(!c||!data.length)return;
  const ctx=c.getContext('2d'),dpr=window.devicePixelRatio||1,w=c.parentElement.clientWidth,h=190;
  c.width=w*dpr;c.height=h*dpr;c.style.width=w+'px';c.style.height=h+'px';ctx.scale(dpr,dpr);
  const total=data.reduce((s,d)=>s+d.value,0),cx=w/2,cy=h/2,r=68,ir=44;
  let angle=-Math.PI/2;
  data.forEach((d,i)=>{const sl=(d.value/total)*Math.PI*2;ctx.beginPath();ctx.arc(cx,cy,r,angle,angle+sl);ctx.arc(cx,cy,ir,angle+sl,angle,true);ctx.closePath();ctx.fillStyle=PIE_COLORS[i%PIE_COLORS.length];ctx.fill();angle+=sl;});
  ctx.fillStyle='#E8E8F0';ctx.font='700 17px Rubik';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(fm(total),cx,cy-7);
  ctx.font='400 10px Rubik';ctx.fillStyle='#8888A0';ctx.fillText('סה"כ הוצאות',cx,cy+11);
}

function drawBar(id,txs){
  const c=document.getElementById(id);if(!c)return;
  const ctx=c.getContext('2d'),dpr=window.devicePixelRatio||1,w=c.parentElement.clientWidth,h=180;
  c.width=w*dpr;c.height=h*dpr;c.style.width=w+'px';c.style.height=h+'px';ctx.scale(dpr,dpr);
  const map={};txs.forEach(t=>{const m=new Date(t.date).getMonth();if(!map[m])map[m]={month:m,income:0,expense:0};map[m][t.type]+=t.amount;});
  const ms=Object.values(map).sort((a,b)=>a.month-b.month);if(!ms.length)return;
  const mx=Math.max(...ms.map(m=>Math.max(m.income,m.expense))),cH=h-35,cY=8,bW=Math.min(24,(w-40)/ms.length/2.5),gap=(w-20)/ms.length;
  ms.forEach((m,i)=>{const x=10+i*gap+gap/2,hI=mx?(m.income/mx)*cH:0,hE=mx?(m.expense/mx)*cH:0;
    ctx.fillStyle='#2DD4A8';ctx.beginPath();rr(ctx,x-bW-2,cY+cH-hI,bW,hI,4);ctx.fill();
    ctx.fillStyle='#FF6B6B';ctx.beginPath();rr(ctx,x+2,cY+cH-hE,bW,hE,4);ctx.fill();
    ctx.fillStyle='#55556A';ctx.font='400 10px Rubik';ctx.textAlign='center';ctx.fillText(MONTHS[m.month],x,h-4);});
  ctx.fillStyle='#2DD4A8';ctx.fillRect(w-95,4,8,8);ctx.fillStyle='#8888A0';ctx.font='400 10px Rubik';ctx.textAlign='right';ctx.fillText('הכנסות',w-99,12);
  ctx.fillStyle='#FF6B6B';ctx.fillRect(w-44,4,8,8);ctx.fillStyle='#8888A0';ctx.fillText('הוצאות',w-48,12);
}
function rr(ctx,x,y,w,h,r){if(h<=0)return;ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h);ctx.lineTo(x,y+h);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);}

// ─── Admin Panel ───
function tryAdminLogin(){
  const inp=document.getElementById('adminPassInput');
  if(inp&&inp.value===ADMIN_PASS){S.adminAuth=true;S.screen='admin';S.showAdminLogin=false;render();}
  else{alert('סיסמה שגויה');}}

function openAdminLogin(){S.showAdminLogin=true;render();}
function closeAdminLogin(){S.showAdminLogin=false;render();}
function exitAdmin(){S.screen='main';S.adminAuth=false;S.tab='settings';render();}

function renderAdmin(){
  const ps=lp(),ids=Object.keys(ps).sort((a,b)=>(ps[b].created||0)-(ps[a].created||0));
  let totalIncome=0,totalExpense=0,totalTx=0;
  ids.forEach(id=>{const p=ps[id];(p.transactions||[]).forEach(t=>{totalTx++;if(t.type==='income')totalIncome+=t.amount;else totalExpense+=t.amount;});});
  return`<div class="app">
    <div class="header fade-up">
      <div class="header-right">
        <img src="${LOGO_SM}" style="width:32px;height:32px" alt="SF">
        <div><div class="logo">SMARTFLOW</div><div class="logo-sub" style="color:var(--orange)">🔒 פאנל ניהול</div></div>
      </div>
      <button class="filter-btn" style="padding:8px 14px;border-color:var(--red);color:var(--red)" onclick="exitAdmin()">יציאה ✕</button>
    </div>

    <!-- Admin Stats -->
    <div class="stats fade-up">
      <div class="stat-card"><div class="stat-bar" style="background:linear-gradient(90deg,var(--accent),transparent)"></div><div class="stat-icon">👥</div><div class="stat-label">משתמשים</div><div class="stat-value" style="color:var(--accent)">${ids.length}</div></div>
      <div class="stat-card"><div class="stat-bar" style="background:linear-gradient(90deg,var(--green),transparent)"></div><div class="stat-icon">📈</div><div class="stat-label">סה"כ הכנסות</div><div class="stat-value" style="color:var(--green)">${fm(totalIncome)}</div></div>
      <div class="stat-card"><div class="stat-bar" style="background:linear-gradient(90deg,var(--red),transparent)"></div><div class="stat-icon">📉</div><div class="stat-label">סה"כ הוצאות</div><div class="stat-value" style="color:var(--red)">${fm(totalExpense)}</div></div>
    </div>

    <div class="chart-card fade-up d1" style="padding:14px 16px;margin-bottom:8px;background:var(--accent-dim);border-color:rgba(108,99,255,0.25)">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div style="font-size:13px;font-weight:600;color:var(--accent)">📊 סה"כ רשומות: ${totalTx}</div>
        <div style="font-size:13px;font-weight:600;color:${totalIncome-totalExpense>=0?'var(--green)':'var(--red)'}">יתרה כוללת: ${fm(totalIncome-totalExpense)}</div>
      </div>
    </div>

    <!-- Users List -->
    <div class="chart-card fade-up d2">
      <div class="chart-title">👥 כל המשתמשים</div>
      ${ids.length===0?'<div class="empty-state"><div class="empty-icon">📭</div>אין משתמשים</div>':
        ids.map(id=>{
          const p=ps[id];
          const txs=p.transactions||[];
          const inc=txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
          const exp=txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
          const bal=inc-exp;
          const lastTx=txs.length?txs.sort((a,b)=>new Date(b.date)-new Date(a.date))[0]:null;
          const partner=getPartner(id);
          return`<div style="display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--border)">
            <div style="width:44px;height:44px;border-radius:50%;background:${p.color};display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;flex-shrink:0">${p.name.charAt(0)}</div>
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
                <span style="font-size:15px;font-weight:600">${p.name}</span>
                ${p.mode==='couple'?'<span class="couple-badge" style="font-size:9px;padding:2px 6px">💕 זוגי</span>':''}
              </div>
              <div style="font-size:11px;color:var(--text3);display:flex;gap:10px;flex-wrap:wrap">
                <span>${txs.length} רשומות</span>
                <span style="color:var(--green)">+${fm(inc)}</span>
                <span style="color:var(--red)">−${fm(exp)}</span>
                <span style="color:${bal>=0?'var(--green)':'var(--red)'}">יתרה: ${fm(bal)}</span>
              </div>
              ${partner?`<div style="font-size:10px;color:var(--pink);margin-top:2px">💕 משותף עם ${partner.name}</div>`:''}
              ${lastTx?`<div style="font-size:10px;color:var(--text3);margin-top:2px">פעולה אחרונה: ${lastTx.desc} (${fd(lastTx.date)})</div>`:''}
            </div>
          </div>`;
        }).join('')}
    </div>

    <div style="text-align:center;margin-top:20px">
      <img src="${LOGO_SM}" style="width:36px;height:36px" alt="SF">
      <div style="font-size:13px;font-weight:700;margin-top:4px">SMARTFLOW Admin</div>
      <div style="font-size:10px;color:var(--text3)">פאנל ניהול</div>
    </div>
  </div>`;
}

if('serviceWorker'in navigator){const sw=`const C='sf-v2';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(['./'])));self.skipWaiting();});self.addEventListener('activate',e=>{e.waitUntil(clients.claim());});self.addEventListener('fetch',e=>{e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));});`;navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});}

init();
</script>
</body>
</html>
